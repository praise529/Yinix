<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Links!!! 🔗 -->
    <link rel="stylesheet" href="Index.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join a class - Yinix!</title>
</head>
<body>
    <side-bar selected="Home"></side-bar>
    <top-bar></top-bar>

    <div class="Main">
        <h1>Join a Class</h1><br>
        <p class="Muted">Welcome! This is where you can join a classroom. Enjoy! :)</p><br><br>

        <form method="post" style="flex-direction: column; display: flex;">
            <label for="JoinCodeInput">Join Code</label><br>
            <input type="number" id="JoinCodeInput" name="JoinCodeInput" placeholder="1x929d"><br><br>
            <button type="submit">Join <i class="ph-bold ph-arrow-up-right"></i></button>
        </form>
    </div>

    <script src="./Index.js"></script>
</body>
