<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Links!!! 🔗 -->
    <link rel="stylesheet" href="../Index.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/bold/style.css" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Yinix</title>
</head>

<body>
    <br><br><div class="Account_Form">
        <h1>Sign Up</h1>
        <p class="Muted">Get access to whiteboards, attendance, classrooms, and more!</p><br>
        
        <form method="post" id="SignupForm">
            <label for="SignupName">Your Name</label><br>
            <input type="text" name="SignupName" id="SignupName"
            required placeholder="Mary May" autocomplete="name">

            <label for="SignupEmail">Your Email</label><br>
            <input type="email" name="SignupEmail" id="SignupEmail"
            maxlength="255" minlength="5" placeholder="yourname@schooldomain.com" autocapitalize="off"
            autocomplete="email">

            <label for="SignupPassword">Your New Secure Password</label><br>
            <input type="password" name="SignupPassword" id="SignupPassword"
            placeholder="This might be chosen by your teacher" autocomplete="new-password">

            <div class="Row">
                <div>
                    <label for="SignupAge">Your Age</label><br><br>
                    <input type="number" name="SignupAge" id="SignupAge"
                    placeholder="10">
                </div>
                <div>
                    <label for="SignupRole">Your Role</label><br><br>
                    <select id="SignupRole" name="SignupRole">
                        <option value="Student">Student</option>
                        <option value="Teacher">Teacher</option>
                        <option value="Parent">Parent/Guardian</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div><br><br>

            <button type="submit">Signup!</button>
        </form><br><br>

        <div class="Social_Buttons">
            <button class="OAuth2_Signin_Button White-Button" id="Google"><i class="ph-bold ph-google-logo"></i> Sign Up With Google</button>
            <button class="OAuth2_Signin_Button White-Button" id="Apple"><i class="ph-bold ph-apple-logo"></i> Sign Up With Apple</button>
        </div><br>

        <p>In the wrong place? <a href="./Signin.html">Sign In</a>!</p><br><br>
    </div>


    <script>
        async function Account(Name, Email, Password, Age, Role) {
          try {
            const Res = await fetch("http://localhost:2820/API/Auth/SignUp", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ Name: Name, Email: Email, Password: Password, Age: Age, Role: Role })
            });
            const Data = await Res.json();

            console.log(Data);
            localStorage.setItem("Yinix-Account", JSON.stringify(Data));
            setTimeout(() => document.location = "../index.html", 500);
            return Data;
          } catch (Err) {
            console.error(Err);
            return null;
          }
        }
        var YAccount = "";
        const SignupName = document.getElementById("SignupName");
        const SignupEmail = document.getElementById("SignupEmail");
        const SignupPassword = document.getElementById("SignupPassword");
        const SignupAge = document.getElementById("SignupAge");
        const SignupRole = document.getElementById("SignupRole");
        const SignupForm = document.getElementById("SignupForm");

        SignupForm.addEventListener("submit", (E) => {
            E.preventDefault();
            YAccount = Account(SignupName.value, SignupEmail.value, SignupPassword.value, SignupAge.value, SignupRole.value);
        });
    </script>
</body>

</html>
